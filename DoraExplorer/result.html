<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Final</title>
  <style>
    body {
      background: #3c506c; 
      display: flex;
      justify-content: center;   
      align-items: center;       
      height: 100vh;            
      margin: 0;
    }

    div {
      background: linear-gradient(90deg, #e3ffe7 0%, #d9e7ff 100%);
      color: #333;
      padding: 20px 40px;
      border-radius: 10px;
      text-align: center;
      font-size: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      max-width: 400px;
      animation: shake 0.8s ease;  
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      20% { transform: translateX(-15px); }
      40% { transform: translateX(15px); }
      60% { transform: translateX(-15px); }
      80% { transform: translateX(15px); }
      100% { transform: translateX(0); }
    }

    a {
      text-decoration: none;
      display: inline-block;
      margin-top: 15px;
    }

    a h2 {
      color: #b72f2f;
      background:#1a252f ;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 20px;
      transition: 0.3s;
    }

    a h2:hover {
      background: #10afaf;
      color: #fff;
    }
  </style>
</head>
<body>
  <div>
    <h1>❌ Nah! It's not here.</h1>
    <h2>Try again.</h2> 
    <a href="map.html"><h2>Back</h2></a>
  </div>
</body>
</html>
