<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Let's go</title>
</head>
<style>
	* {
		box-sizing: border-box;
	}

	body {
		margin: 0;
		min-height: 100vh;
		padding: 24px 16px 40px;
		background: radial-gradient(circle, rgba(238, 174, 202, 1) 0%, rgba(148, 187, 233, 1) 100%);
		font-family: Arial, sans-serif;
	}

	.wrapper {
		width: min(100%, 980px);
		margin: 0 auto;
	}

	h2{
		color: red;
	    font-size: clamp(28px, 5vw, 40px);
		margin: 0 0 24px;
		text-decoration: underline; 
		text-align: center;
	}
	img{
		margin: auto;
		display: block;
		width: 100%;
		max-width: 894px;
		height: auto;
		border-radius: 16px;
		box-shadow: 0 12px 28px rgba(0, 0, 0, 0.18);
	}

	@media (max-width: 640px) {
		body {
			padding: 20px 12px 32px;
		}

		h2 {
			margin-bottom: 18px;
		}
	}

</style>
<body>
	<div class="wrapper">
		<h2><i>Click the map</i></h2>
		<img
			src="81tYClpOcSL._UF894,1000_QL80_.jpg"
			usemap="#Dora"
			alt="Dora Explorer character map"
			width="894"
			height="1000"
		>
		<map name="Dora">
			<area shape="rect" coords="240,296,322,454" href="https://youtu.be/gGslvfeQocU?si=lMIwCOuH9ku35sOM" alt="DoraCartoon" target="_blank">
			<area shape="rect" target="_blank" coords="20,157,141,449" href="https://www.google.com/search?sa=X&sca_esv=9c54605068baa6ec&biw=1920&bih=911&q=dora+explorer&si=AMgyJEuYX5Hw7261KZxKc6opSy4g4YKqWuMhqjlu5VpSCmjOUgfPBhvCpOyJdr4XY_OMEATaln2ctb5PlHlhMImi5Ej3-o9D9j9FACedFE3opFwpJo8mP8g%3D&ved=2ahUKEwiS9ZzWqKqOAxXOwjgGHbpiHJkQyNoBKAB6BAgnEAA&ictx=1">
			<area shape="rect" coords="230,109,288,223" target="_self" href="map.html">
		</map>
	</div>

	<script>
		function makeImageMapResponsive() {
			const images = document.querySelectorAll('img[usemap]');

			images.forEach((image) => {
				const mapName = image.getAttribute('usemap').replace('#', '');
				const map = document.querySelector(`map[name="${mapName}"]`);

				if (!map) {
					return;
				}

				const areas = map.querySelectorAll('area');
				const naturalWidth = image.naturalWidth || Number(image.getAttribute('width'));
				const naturalHeight = image.naturalHeight || Number(image.getAttribute('height'));

				if (!naturalWidth || !naturalHeight) {
					return;
				}

				areas.forEach((area) => {
					if (!area.dataset.originalCoords) {
						area.dataset.originalCoords = area.coords;
					}

					const originalCoords = area.dataset.originalCoords.split(',').map(Number);
					const widthRatio = image.clientWidth / naturalWidth;
					const heightRatio = image.clientHeight / naturalHeight;

					const resizedCoords = originalCoords.map((coord, index) => {
						const ratio = index % 2 === 0 ? widthRatio : heightRatio;
						return Math.round(coord * ratio);
					});

					area.coords = resizedCoords.join(',');
				});
			});
		}

		window.addEventListener('load', makeImageMapResponsive);
		window.addEventListener('resize', makeImageMapResponsive);
	</script>
</body>
</html>
