<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>We Did It!</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&display=swap');

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: url("e3ed8733e6a1ff0400821e2c829a11bd.jpg") no-repeat center center fixed;
      background-size: cover;
      font-family: 'Poppins', sans-serif;
    }

    .title {
        font-size:50px;
        font-weight: 500;
        font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;

      text-align: center;
      color:deepskyblue;
      margin: 5px 0;
    }

    h1 i {
      color: #2c3e50;
    }

    img {
      display: block;
      margin: 20px auto;
      max-width: 550px;

      border-radius: 10px;

    a {
      text-decoration: none;

      padding: 12px 30px;
      border-radius: 8px;
      margin-top: 20px;
      font-weight: 600;

      background: #1bc912;
      transform: scale(1.05);
